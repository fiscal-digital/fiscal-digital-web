<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Fiscal Digital — GitHub social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D4F4A"/>
      <stop offset="1" stop-color="#093835"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- moldura interna sutil -->
  <rect x="40" y="40" width="1200" height="560" rx="24" fill="none" stroke="#F8F5EE" stroke-opacity="0.08" stroke-width="2"/>

  <!-- símbolo central-esquerda -->
  <g transform="translate(110,180) scale(2.8)">
    <rect width="100" height="100" rx="22" fill="#F8F5EE"/>
    <rect x="22" y="28" width="56" height="6" rx="2" fill="#0D4F4A"/>
    <rect x="22" y="47" width="34" height="6" rx="2" fill="#0D4F4A"/>
    <rect x="22" y="66" width="56" height="6" rx="2" fill="#0D4F4A"/>
    <rect x="62" y="45" width="16" height="10" rx="2" fill="#F5B700"/>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" fill="#F8F5EE">
    <text x="450" y="240" font-size="92" font-weight="700" letter-spacing="-2">
      <tspan>Fiscal</tspan> <tspan font-weight="400">Digital</tspan>
    </text>
    <text x="450" y="296" font-size="28" font-weight="500" fill="#F5B700" letter-spacing="0.4">FISCALIZAÇÃO AUTÔNOMA · OPEN SOURCE · MIT</text>
    <text x="450" y="356" font-size="24" font-weight="400" fill="#F8F5EE" opacity="0.85">Agentes autônomos que leem diários oficiais e</text>
    <text x="450" y="388" font-size="24" font-weight="400" fill="#F8F5EE" opacity="0.85">transformam dados públicos em alertas verificáveis.</text>

    <!-- pills de tecnologia / posicionamento -->
    <g font-size="18" font-weight="600" letter-spacing="0.4">
      <g transform="translate(450,440)">
        <rect width="180" height="40" rx="20" fill="#F8F5EE" fill-opacity="0.10"/>
        <text x="90" y="26" text-anchor="middle">TYPESCRIPT</text>
      </g>
      <g transform="translate(644,440)">
        <rect width="160" height="40" rx="20" fill="#F8F5EE" fill-opacity="0.10"/>
        <text x="80" y="26" text-anchor="middle">AWS LAMBDA</text>
      </g>
      <g transform="translate(818,440)">
        <rect width="190" height="40" rx="20" fill="#F8F5EE" fill-opacity="0.10"/>
        <text x="95" y="26" text-anchor="middle">CLAUDE HAIKU 4.5</text>
      </g>
    </g>

    <text x="450" y="540" font-size="18" font-weight="500" fill="#F8F5EE" opacity="0.6" letter-spacing="0.6">github.com/fiscal-digital · fiscaldigital.org</text>
    <text x="450" y="572" font-size="15" font-weight="400" fill="#F8F5EE" opacity="0.5" letter-spacing="0.4">Sobre os ombros de Serenata de Amor &amp; Querido Diário (OKFN Brasil)</text>
  </g>
</svg>
