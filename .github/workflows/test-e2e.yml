name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Rodar matriz completa (Chromium + Firefox + WebKit)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright (Chromium + Mobile Chrome)
    runs-on: ubuntu-latest
    # Container oficial Playwright Microsoft com Chromium + apt deps pre-instalados.
    # Elimina ~120min de `apt-get install` que ubuntu-latest sofria em cold path.
    # LRN-20260606-003 (revisado): causa real do CANCEL era apt-get install do
    # `--with-deps`, nao CDN. Container resolve definitivamente.
    # Tag DEVE bater com versao do @playwright/test em package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
      options: --user 1001
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests against prod
        env:
          PLAYWRIGHT_BASE_URL: https://fiscaldigital.org
          PLAYWRIGHT_FULL_MATRIX: ${{ inputs.full_matrix && '1' || '' }}
          CI: 'true'
        run: npx playwright test --project=chromium --project=mobile-chrome

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload trace artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
