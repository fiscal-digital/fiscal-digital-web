name: Deploy

on:
  workflow_run:
    workflows: ["E2E Tests"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Roda somente se o E2E passou — evita deploy de commit quebrado
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.fiscaldigital.org

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Arquivos estáticos hashed — TTL longo imutável
      - name: Sync static assets to S3
        run: |
          aws s3 sync .open-next/assets s3://${{ vars.S3_CACHE_BUCKET }}/_next-static \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # Cache ISR pré-aquecido em build (páginas top-50 pré-renderizadas)
      - name: Sync ISR cache to S3
        run: |
          aws s3 sync .open-next/cache s3://${{ vars.S3_CACHE_BUCKET }}/cache \
            --delete

      # Deploy Lambda principal (server function)
      - name: Deploy server Lambda
        run: |
          cd .open-next/server-functions/default
          zip -r ../../../server-function.zip .
          cd ../../..
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_FN_NAME }} \
            --zip-file fileb://server-function.zip \
            --region us-east-1

      # Deploy Lambda de revalidação (worker SQS do ISR)
      - name: Deploy revalidation Lambda
        run: |
          cd .open-next/revalidation-function
          zip -r ../../revalidation-function.zip .
          cd ../..
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_REVALIDATE_FN_NAME }} \
            --zip-file fileb://revalidation-function.zip \
            --region us-east-1

      # Invalidação seletiva — NÃO invalida /_next/static/* (hashed, imutável)
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/" "/pt-br/*" "/en-us/*"
