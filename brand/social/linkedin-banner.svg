<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="Fiscal Digital — banner LinkedIn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#0D4F4A"/>
      <stop offset="0.6" stop-color="#0D4F4A"/>
      <stop offset="1"   stop-color="#093835"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- linhas decorativas (à direita, fora da safe-zone do avatar) -->
  <g opacity="0.08" fill="#F8F5EE">
    <rect x="1120" y="80"  width="380" height="6" rx="2"/>
    <rect x="1120" y="118" width="260" height="6" rx="2"/>
    <rect x="1120" y="156" width="340" height="6" rx="2"/>
    <rect x="1120" y="234" width="380" height="6" rx="2"/>
    <rect x="1120" y="272" width="220" height="6" rx="2"/>
    <rect x="1120" y="310" width="320" height="6" rx="2"/>
  </g>
  <rect x="1370" y="153" width="56" height="26" rx="6" fill="#F5B700" opacity="0.9"/>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" fill="#F8F5EE">
    <text x="450" y="180" font-size="78" font-weight="700" letter-spacing="-2">
      <tspan>Fiscal</tspan> <tspan font-weight="400">Digital</tspan>
    </text>
    <text x="450" y="232" font-size="26" font-weight="500" fill="#F5B700" letter-spacing="0.4">FISCALIZAÇÃO AUTÔNOMA DE GASTOS PÚBLICOS</text>
    <text x="450" y="276" font-size="20" font-weight="400" fill="#F8F5EE" opacity="0.8">Agentes autônomos que leem diários oficiais e</text>
    <text x="450" y="304" font-size="20" font-weight="400" fill="#F8F5EE" opacity="0.8">transformam dados públicos em alertas verificáveis.</text>
    <text x="450" y="346" font-size="14" font-weight="500" fill="#F8F5EE" opacity="0.55" letter-spacing="0.4">Sobre os ombros de Serenata de Amor &amp; Querido Diário (OKFN Brasil)</text>
  </g>
</svg>
