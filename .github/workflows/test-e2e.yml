name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Rodar matriz completa (Chromium + Firefox + WebKit)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright (Chromium + Mobile Chrome)
    runs-on: ubuntu-latest
    # 60min temporariamente: cold cache run NUNCA terminou em 25min porque
    # CDN da Playwright (https://cdn.playwright.dev) está extremamente lento
    # baixando Chrome for Testing (~150MB → 24min+ observado). 60min dá
    # buffer para download lento + suite real (~17min). Depois do PRIMEIRO
    # run completar com sucesso, cache fica populado em ~/.cache/ms-playwright
    # e runs subsequentes ficam ~20min. Em PR follow-up reduzir para 30min.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache do binário do Chromium do Playwright (resolve cold-download
      # de ~10-30min do CDN da Playwright observado em 2026-06-06).
      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (cold)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (warm cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests against prod
        env:
          PLAYWRIGHT_BASE_URL: https://fiscaldigital.org
          PLAYWRIGHT_FULL_MATRIX: ${{ inputs.full_matrix && '1' || '' }}
          CI: 'true'
        run: npx playwright test --project=chromium --project=mobile-chrome

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload trace artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
